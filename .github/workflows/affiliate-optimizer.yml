name: GHP Affiliate Revenue Optimizer

on:
  schedule:
    # Run Monday and Thursday at 10am ET (14:00 UTC)
    - cron: '0 14 * * 1,4'
  workflow_dispatch: # Allow manual trigger

jobs:
  optimize-affiliates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Optimize Affiliate Programs
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the Revenue Manager for Golden Home Project LLC.

            Optimize our affiliate revenue across all platforms:

            1. CJ Affiliate: Check for new pending offers and ACCEPT ALL of them
            2. Impact.com: Check for new brand partnership proposals
            3. Awin (Publisher ID: 2823700): Search for new home product programs
            4. Amazon Associates (tag: goldenhomep06-20): Check for account alerts

            For each platform:
            - Accept any pending offers (more advertisers = more revenue)
            - Apply to relevant home/kitchen/bathroom/tech programs
            - Note commission rates and terms
            - Track which programs are active vs pending

            Save report to reports/affiliate-report-$(date +%Y-%m-%d).md

            IMPORTANT: Accept ALL offers unless they are clearly spam or fraudulent.
          max_turns: 25
