name: GHP Weekly Content Generator

on:
  schedule:
    # Run every Sunday at 9am ET (13:00 UTC)
    - cron: '0 13 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow for image generation
        run: pip install Pillow

      - name: Generate Next Week's Content
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the Content Director for Golden Home Project LLC.

            Generate 7 new social media posts for next week:
            - Monday: Kitchen Tools
            - Tuesday: Self-Care/Bathroom
            - Wednesday: Tech Accessories
            - Thursday: Bedroom Upgrades
            - Friday: Home Office/Desk
            - Saturday: Organization/Cleaning
            - Sunday: Weekly Roundup/Best Of

            For each post:
            1. Create a branded 1080x1080 JPG image using Python Pillow
               - Brand colors: #1B5E3B (green), #F5A623 (gold), #FFFFFF (white), #F5F5F0 (bg)
               - Include: brand header, title, "Under $XX" pill, 5 numbered product cards with prices, footer CTA
            2. Write a caption with 5 product descriptions, prices, "Link in bio" CTA, and 30 hashtags
            3. Save images as content/posts/GHP_Post_XXX.jpg
            4. Save captions as content/posts/GHP_Post_XXX_Caption.txt

            All products must be real Amazon products under $30. Make captions conversational and engaging.
          max_turns: 30

      - name: Commit and push new content
        run: |
          git config user.name "GHP Content Bot"
          git config user.email "goldenhomeprojectllc@gmail.com"
          git add content/posts/
          git commit -m "Auto-generate weekly content $(date +%Y-%m-%d)" || echo "No new content"
          git push
