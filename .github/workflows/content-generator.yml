name: GHP Content Generator Agent

# Runs daily at 11:00 AM ET (16:00 UTC)
# Generates transformation video scripts, finds trending products,
# creates content pipeline entries

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests edge-tts Pillow

      - name: Run Content Generator Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          cat > /tmp/content_agent_prompt.txt << 'PROMPT'
          You are the GHP Content Generator agent for Golden Home Project LLC.

          FIRST: Read BUSINESS_BRAIN.md — it is the single source of truth.

          YOUR DAILY JOB:
          1. Research trending home products on Amazon (kitchen, bedroom, bathroom, organization)
          2. Generate 2-3 new transformation video scripts using the PROVEN format:
             - Hook (use proven patterns from BUSINESS_BRAIN.md)
             - Before scene (messy/outdated room)
             - Product reveal with SPECIFIC price ("$47", not "affordable")
             - After scene (transformed space)
             - Call to action with affiliate link
          3. Save scripts to: automation/scripts/script-YYYY-MM-DD-NNN.py
          4. Update BUSINESS_BRAIN.md content pipeline table

          CONTENT FORMAT RULES (from validated data):
          - Transformation before/after + specific cost = TOP performer (5,779 views)
          - Product roundups = FAILURE (50-200 views). NEVER create these.
          - Always use exact dollar amounts in hooks
          - Series content (Room by Room) drives subscriber growth

          REVENUE-RANKED FORMATS:
          1. Transformation before/after + specific cost
          2. "I tested $X vs $Y" comparison
          3. "I use this every morning" daily utility
          4. Weird/surprising finds — high share rate
          5. Room series episodes — subscriber compounding

          PROVEN HOOKS:
          - "My [room] looked like this. Same [room]. $[amount]."
          - "I've been doing [X] wrong for [N] years. This fixed it."
          - "I was skeptical. I was wrong."
          - "I use this every single morning."

          AFFILIATE INTEGRATION:
          - Amazon tag: goldenhomep06-20
          - Prioritize Syruvia products (20% commission) in kitchen content
          - Include Best Choice Products where relevant (15% commission)
          - Each script should have 3-5 affiliate product links

          Save all work. Update BUSINESS_BRAIN.md content pipeline.
          Commit to claude/ branch. NEVER commit to main.
          PROMPT

          # Use claude CLI if available, otherwise use API directly
          if command -v claude &> /dev/null; then
            claude --print "$(cat /tmp/content_agent_prompt.txt)"
          else
            python3 << 'PYTHON'
          import requests, os, json
          from datetime import datetime

          # Generate a simple content script as fallback
          date_str = datetime.now().strftime("%Y-%m-%d")
          tag = os.environ.get("AMAZON_ASSOCIATE_TAG", "goldenhomep06-20")

          script_dir = "automation/scripts"
          os.makedirs(script_dir, exist_ok=True)

          # Create a placeholder script noting that full generation needs Claude CLI
          script_content = f'''# GHP Content Script - {date_str}
          # Auto-generated by Content Generator Agent
          # Full AI generation requires Claude CLI — this is a template

          SCRIPT_DATE = "{date_str}"
          AMAZON_TAG = "{tag}"

          # TODO: Research trending Amazon home products
          # TODO: Generate transformation script with proven hook format
          # TODO: Include 3-5 affiliate links with specific prices

          print(f"Content script template created for {{SCRIPT_DATE}}")
          print("Run with Claude CLI for full AI-powered script generation")
          '''

          script_path = f"{script_dir}/script-{date_str}-001.py"
          with open(script_path, "w") as f:
              f.write(script_content)

          print(f"Created template script: {script_path}")
          PYTHON
          fi

      - name: Commit generated content
        run: |
          git config user.name "GHP Content Bot"
          git config user.email "goldenhomeprojectllc@gmail.com"
          git add automation/scripts/ BUSINESS_BRAIN.md || true
          git diff --staged --quiet || git commit -m "Content generator: $(date +%Y-%m-%d)"
          git push || true
