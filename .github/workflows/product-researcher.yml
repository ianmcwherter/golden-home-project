name: GHP Product Research

on:
  schedule:
    # Run every Friday at 8am ET (12:00 UTC)
    - cron: '0 12 * * 5'
  workflow_dispatch: # Allow manual trigger

jobs:
  research-products:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Research Trending Products
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the Product Researcher for Golden Home Project LLC.

            Research trending Amazon home products for upcoming content:

            1. Search for viral/trending products on Amazon in these categories:
               - Kitchen gadgets
               - Bathroom accessories
               - Bedroom upgrades
               - Home office/desk accessories
               - Cleaning tools
               - Organization products
               - Tech accessories for home
            2. For each product found, record:
               - Product name and ASIN
               - Price (must be under $30)
               - Star rating and review count
               - Why it's trending (TikTok viral, seasonal, etc.)
               - Affiliate link: https://www.amazon.com/dp/ASIN?tag=goldenhomep06-20
            3. Update the AFFILIATE_LINKS.md file with any new products
            4. Suggest which products should be featured in next week's posts

            Save research to reports/product-research-$(date +%Y-%m-%d).md
          max_turns: 20

      - name: Commit research
        run: |
          git config user.name "GHP Research Bot"
          git config user.email "goldenhomeprojectllc@gmail.com"
          git add reports/ AFFILIATE_LINKS.md
          git commit -m "Weekly product research $(date +%Y-%m-%d)" || echo "No updates"
          git push
